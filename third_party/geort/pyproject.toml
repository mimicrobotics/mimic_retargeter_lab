[project]
name = "geort"
version = "0.2.0"
description = "Vendored fork of GeoRT (Meta) — see README.md and LICENSE."
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["geort*"]
exclude = ["assets*", "checkpoint*", "data*", "media*", "scripts*", "tests*", "utils*", "images*"]
